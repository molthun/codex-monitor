Disk2=D:
Disk3=E:

[MeasureCPU]
Measure=CPU
Processor=0

[MeasureRAM]
Measure=PhysicalMemory

[MeasureRAMTotal]
Measure=PhysicalMemory
Total=1

[MeasureRAMPct]
Measure=Calc
Formula=(MeasureRAM / MeasureRAMTotal) * 100
MinValue=0
MaxValue=100

[MeasureGPU]
Measure=Plugin
Plugin=UsageMonitor
Alias=GPU
Index=0
Percent=1
MinValue=0
MaxValue=100

[MeasureGPUValue]
Measure=Calc
Formula=Clamp(MeasureGPU, 0, 100)
MinValue=0
MaxValue=100

[MeasureTempsRaw]
Measure=WebParser
URL=file://#@#temps.txt
RegExp=(?siU)CPU=(.*)\nGPUCore=(.*)\nGPUHotspot=(.*)\nGPUMemory=(.*)\nVRAMUsedMB=(.*)\nVRAMTotalMB=(.*)\nVRAMPct=(.*)\nGPUFan=(.*)\nGPUFanPct=(.*)\nCPUFan=(.*)\nBoardFan1=(.*)\nBoardFan2=(.*)\nBoardFan3=(.*)\nBoardFan4=(.*)\nBoardFan5=(.*)\nBoardFan6=(.*)\nBoardFan7=(.*)\nPSUFan=(.*)\nNetEthInMbps=(.*)\nNetEthOutMbps=(.*)\nNetWifiInMbps=(.*)\nNetWifiOutMbps=(.*)\nNetWifiApInMbps=(.*)\nNetWifiApOutMbps=(.*)\nNetWifiActiveMode=(.*)\nNetWifiActiveInMbps=(.*)\nNetWifiActiveOutMbps=(.*)\nNetWifiActiveDlMbps=(.*)\nNetWifiActiveUlMbps=(.*)
UpdateRate=1

[MeasureCPUTemp]
Measure=WebParser
URL=[MeasureTempsRaw]
StringIndex=1
MinValue=0
MaxValue=100

[MeasureGPUCoreTemp]
Measure=WebParser
URL=[MeasureTempsRaw]
StringIndex=2
MinValue=0
MaxValue=100

[MeasureVRAMUsedMB]
Measure=WebParser
URL=[MeasureTempsRaw]
StringIndex=5
MinValue=0

[MeasureVRAMTotalMB]
Measure=WebParser
URL=[MeasureTempsRaw]
StringIndex=6
MinValue=0

[MeasureVRAMPct]
Measure=WebParser
URL=[MeasureTempsRaw]
StringIndex=7
MinValue=0
MaxValue=100

[MeasureVRAMUsedGB]
Measure=Calc
Formula=MeasureVRAMUsedMB / 1024
MinValue=0
DynamicVariables=1

[MeasureVRAMTotalGB]
Measure=Calc
Formula=MeasureVRAMTotalMB / 1024
MinValue=0
DynamicVariables=1

[MeasureGPUFan]
Measure=WebParser
URL=[MeasureTempsRaw]
StringIndex=8

[MeasureGPUFanPct]
Measure=WebParser
URL=[MeasureTempsRaw]
StringIndex=9
MinValue=0
MaxValue=100

[MeasureCPUFan]
Measure=WebParser
URL=[MeasureTempsRaw]
StringIndex=10
MinValue=0
MaxValue=2500

[MeasureBoardFan2]
Measure=WebParser
URL=[MeasureTempsRaw]
StringIndex=12
MinValue=0
MaxValue=2000

[MeasureBoardFan7]
Measure=WebParser
URL=[MeasureTempsRaw]
StringIndex=17
MinValue=0
MaxValue=1500

[MeasureVisualState]
Measure=Calc
Formula=1
IfCondition=(MeasureCPUTemp < 65)
IfTrueAction=[!SetOption HealthCPU Text "CPU OK %1C"][!SetOption HealthCPU FontColor "#OK#"][!SetOption HealthCPUBar SolidColor "#OK#"][!SetOption BarCPUTemp BarColor "#OK#"][!SetOption LabelCPUTemp FontColor "#Muted#"][!SetOption LineCPUTempHistory LineColor "#OK#"][!SetOption HealthBg Shape "Rectangle #Pad#,#HealthY#,#BarW#,#HealthH#,#HealthR# | Fill Color 78,205,196,6 | StrokeWidth 1 | Stroke Color 78,205,196,32"]
IfCondition2=(MeasureCPUTemp >= 65) && (MeasureCPUTemp < 80)
IfTrueAction2=[!SetOption HealthCPU Text "CPU WARM %1C"][!SetOption HealthCPU FontColor "#Warm#"][!SetOption HealthCPUBar SolidColor "#Warm#"][!SetOption BarCPUTemp BarColor "#Warm#"][!SetOption LabelCPUTemp FontColor "#Warm#"][!SetOption LineCPUTempHistory LineColor "#Warm#"][!SetOption HealthBg Shape "Rectangle #Pad#,#HealthY#,#BarW#,#HealthH#,#HealthR# | Fill Color 255,193,94,26 | StrokeWidth 1 | Stroke Color 255,193,94,70"]
IfCondition3=(MeasureCPUTemp >= 80)
IfTrueAction3=[!SetOption HealthCPU Text "CPU HOT %1C"][!SetOption HealthCPU FontColor "#Hot#"][!SetOption HealthCPUBar SolidColor "#Hot#"][!SetOption BarCPUTemp BarColor "#Hot#"][!SetOption LabelCPUTemp FontColor "#Hot#"][!SetOption LineCPUTempHistory LineColor "#Hot#"][!SetOption HealthBg Shape "Rectangle #Pad#,#HealthY#,#BarW#,#HealthH#,#HealthR# | Fill Color 255,113,113,34 | StrokeWidth 1 | Stroke Color 255,113,113,100"]
IfCondition4=(MeasureGPUCoreTemp < 70)
IfTrueAction4=[!SetOption HealthGPU Text "GPU OK %1C"][!SetOption HealthGPU FontColor "#GPU#"][!SetOption HealthGPUBar SolidColor "#GPU#"][!SetOption BarGPUTemp BarColor "#OK#"][!SetOption LabelGPUTemp FontColor "#Muted#"][!SetOption LineGPUTempHistory LineColor "#OK#"]
IfCondition5=(MeasureGPUCoreTemp >= 70) && (MeasureGPUCoreTemp < 83)
IfTrueAction5=[!SetOption HealthGPU Text "GPU WARM %1C"][!SetOption HealthGPU FontColor "#Warm#"][!SetOption HealthGPUBar SolidColor "#Warm#"][!SetOption BarGPUTemp BarColor "#Warm#"][!SetOption LabelGPUTemp FontColor "#Warm#"][!SetOption LineGPUTempHistory LineColor "#Warm#"]
IfCondition6=(MeasureGPUCoreTemp >= 83)
IfTrueAction6=[!SetOption HealthGPU Text "GPU HOT %1C"][!SetOption HealthGPU FontColor "#Hot#"][!SetOption HealthGPUBar SolidColor "#Hot#"][!SetOption BarGPUTemp BarColor "#Hot#"][!SetOption LabelGPUTemp FontColor "#Hot#"][!SetOption LineGPUTempHistory LineColor "#Hot#"][!SetOption HealthBg Shape "Rectangle #Pad#,#HealthY#,#BarW#,#HealthH#,#HealthR# | Fill Color 255,113,113,34 | StrokeWidth 1 | Stroke Color 255,113,113,100"]
IfCondition7=(MeasureCPUFan >= 500) && (MeasureBoardFan2 >= 300) && (MeasureBoardFan7 >= 300) && ((MeasureGPUCoreTemp < 60) || (MeasureGPUFan >= 300) || (MeasureGPUFanPct > 0))
IfTrueAction7=[!SetOption HealthFans Text "FANS OK"][!SetOption HealthFans FontColor "#OK#"][!SetOption HealthFansBar SolidColor "#OK#"]
IfCondition8=(MeasureCPUFan < 500) || (MeasureBoardFan2 < 300) || (MeasureBoardFan7 < 300) || ((MeasureGPUCoreTemp >= 60) && (MeasureGPUFan < 300) && (MeasureGPUFanPct <= 0))
IfTrueAction8=[!SetOption HealthFans Text "FANS LOW"][!SetOption HealthFans FontColor "#Hot#"][!SetOption HealthFansBar SolidColor "#Hot#"][!SetOption HealthBg Shape "Rectangle #Pad#,#HealthY#,#BarW#,#HealthH#,#HealthR# | Fill Color 255,113,113,34 | StrokeWidth 1 | Stroke Color 255,113,113,100"]
IfCondition9=(MeasureRAMPct < 85)
IfTrueAction9=[!SetOption HealthRAM Text "RAM OK %1%"][!SetOption HealthRAM FontColor "#OK#"][!SetOption HealthRAMBar SolidColor "#OK#"][!SetOption BarRAM BarColor "#OK#"][!SetOption LabelRAM FontColor "#Muted#"]
IfCondition10=(MeasureRAMPct >= 85) && (MeasureRAMPct < 95)
IfTrueAction10=[!SetOption HealthRAM Text "RAM HIGH %1%"][!SetOption HealthRAM FontColor "#Warm#"][!SetOption HealthRAMBar SolidColor "#Warm#"][!SetOption BarRAM BarColor "#Warm#"][!SetOption LabelRAM FontColor "#Warm#"][!SetOption HealthBg Shape "Rectangle #Pad#,#HealthY#,#BarW#,#HealthH#,#HealthR# | Fill Color 255,193,94,26 | StrokeWidth 1 | Stroke Color 255,193,94,70"]
IfCondition11=(MeasureRAMPct >= 95)
IfTrueAction11=[!SetOption HealthRAM Text "RAM CRIT %1%"][!SetOption HealthRAM FontColor "#Hot#"][!SetOption HealthRAMBar SolidColor "#Hot#"][!SetOption BarRAM BarColor "#Hot#"][!SetOption LabelRAM FontColor "#Hot#"][!SetOption HealthBg Shape "Rectangle #Pad#,#HealthY#,#BarW#,#HealthH#,#HealthR# | Fill Color 255,113,113,34 | StrokeWidth 1 | Stroke Color 255,113,113,100"]
IfCondition12=(MeasureDiskCUsed / (MeasureDiskCUsed + MeasureDiskCFree) < 0.85)
IfTrueAction12=[!SetOption BarC BarColor "#DISK#"][!SetOption LabelC FontColor "#Muted#"]
IfCondition13=(MeasureDiskCUsed / (MeasureDiskCUsed + MeasureDiskCFree) >= 0.85) && (MeasureDiskCUsed / (MeasureDiskCUsed + MeasureDiskCFree) < 0.95)
IfTrueAction13=[!SetOption BarC BarColor "#Warm#"][!SetOption LabelC FontColor "#Warm#"]
IfCondition14=(MeasureDiskCUsed / (MeasureDiskCUsed + MeasureDiskCFree) >= 0.95)
IfTrueAction14=[!SetOption BarC BarColor "#Hot#"][!SetOption LabelC FontColor "#Hot#"]
IfCondition15=(MeasureDiskDUsed / (MeasureDiskDUsed + MeasureDiskDFree) < 0.85)
IfTrueAction15=[!SetOption BarD BarColor "#DISK#"][!SetOption LabelD FontColor "#Muted#"]
IfCondition16=(MeasureDiskDUsed / (MeasureDiskDUsed + MeasureDiskDFree) >= 0.85) && (MeasureDiskDUsed / (MeasureDiskDUsed + MeasureDiskDFree) < 0.95)
IfTrueAction16=[!SetOption BarD BarColor "#Warm#"][!SetOption LabelD FontColor "#Warm#"]
IfCondition17=(MeasureDiskDUsed / (MeasureDiskDUsed + MeasureDiskDFree) >= 0.95)
IfTrueAction17=[!SetOption BarD BarColor "#Hot#"][!SetOption LabelD FontColor "#Hot#"]
IfCondition18=(MeasureDiskEUsed / (MeasureDiskEUsed + MeasureDiskEFree) < 0.85)
IfTrueAction18=[!SetOption BarE BarColor "#DISK#"][!SetOption LabelE FontColor "#Muted#"]
IfCondition19=(MeasureDiskEUsed / (MeasureDiskEUsed + MeasureDiskEFree) >= 0.85) && (MeasureDiskEUsed / (MeasureDiskEUsed + MeasureDiskEFree) < 0.95)
IfTrueAction19=[!SetOption BarE BarColor "#Warm#"][!SetOption LabelE FontColor "#Warm#"]
IfCondition20=(MeasureDiskEUsed / (MeasureDiskEUsed + MeasureDiskEFree) >= 0.95)
IfTrueAction20=[!SetOption BarE BarColor "#Hot#"][!SetOption LabelE FontColor "#Hot#"]
IfCondition21=(MeasureCPUFan >= 500)
IfTrueAction21=[!SetOption BarCPUFan BarColor "#OK#"][!SetOption LabelCPUFan FontColor "#Muted#"]
IfCondition22=(MeasureCPUFan < 500)
IfTrueAction22=[!SetOption BarCPUFan BarColor "#Hot#"][!SetOption LabelCPUFan FontColor "#Hot#"]
IfCondition23=(MeasureBoardFan2 >= 300)
IfTrueAction23=[!SetOption BarBoardFan2 BarColor "#OK#"][!SetOption LabelBoardFan2 FontColor "#Muted#"]
IfCondition24=(MeasureBoardFan2 < 300)
IfTrueAction24=[!SetOption BarBoardFan2 BarColor "#Hot#"][!SetOption LabelBoardFan2 FontColor "#Hot#"]
IfCondition25=(MeasureBoardFan7 >= 300)
IfTrueAction25=[!SetOption BarBoardFan7 BarColor "#OK#"][!SetOption LabelBoardFan7 FontColor "#Muted#"]
IfCondition26=(MeasureBoardFan7 < 300)
IfTrueAction26=[!SetOption BarBoardFan7 BarColor "#Hot#"][!SetOption LabelBoardFan7 FontColor "#Hot#"]
IfCondition27=(MeasureGPUCoreTemp < 60) && (MeasureGPUFan < 300) && (MeasureGPUFanPct <= 0)
IfTrueAction27=[!SetOption ValueGPUFan Text "idle / %2%"][!SetOption BarGPUFan BarColor "#Track#"][!SetOption LabelGPUFan FontColor "#Muted#"][!SetOption TrackGPUFan Hidden 1][!SetOption LowZoneGPUFan Hidden 1][!SetOption BarGPUFan Hidden 1]
IfCondition28=(MeasureGPUFan >= 300)
IfTrueAction28=[!SetOption ValueGPUFan Text "%1 RPM / %2%"][!SetOption BarGPUFan BarColor "#GPU#"][!SetOption LabelGPUFan FontColor "#Muted#"][!SetOption TrackGPUFan Hidden 0][!SetOption LowZoneGPUFan Hidden 0][!SetOption BarGPUFan Hidden 0]
IfCondition29=(MeasureGPUFan < 300) && (MeasureGPUFanPct > 0)
IfTrueAction29=[!SetOption ValueGPUFan Text "fan %2%"][!SetOption BarGPUFan BarColor "#GPU#"][!SetOption LabelGPUFan FontColor "#Muted#"][!SetOption TrackGPUFan Hidden 0][!SetOption LowZoneGPUFan Hidden 0][!SetOption BarGPUFan Hidden 0]
IfCondition30=(MeasureGPUCoreTemp >= 60) && (MeasureGPUFan < 300) && (MeasureGPUFanPct <= 0)
IfTrueAction30=[!SetOption ValueGPUFan Text "%1 RPM / %2%"][!SetOption BarGPUFan BarColor "#Hot#"][!SetOption LabelGPUFan FontColor "#Hot#"][!SetOption TrackGPUFan Hidden 0][!SetOption LowZoneGPUFan Hidden 0][!SetOption BarGPUFan Hidden 0]
DynamicVariables=1

