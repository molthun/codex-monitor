name: Release

# Build the self-contained CodexBridge binary and attach it to a GitHub Release
# whenever a version tag is pushed. The repository no longer commits the exe;
# the installer and the auto-updater download it from the release produced here.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish bridge (self-contained, single file)
        run: dotnet publish CodexBridge/CodexBridge.csproj -c Release

      - name: Create release and upload bridge binary
        uses: softprops/action-gh-release@v2
        with:
          files: CodexBridge/bin/Release/net10.0-windows/win-x64/publish/CodexBridge.exe
          generate_release_notes: true
