Author=Codex
Information=Desktop monitor using FanControl IPC bridge.
Version=2.0

[Variables]
BarR=3
CPUGrad=90 | 0,229,255,255 ; 0.0 | 0,145,234,255 ; 1.0
RAMGrad=90 | 69,201,151,255 ; 0.0 | 0,230,118,255 ; 1.0
GPUGrad=90 | 151,136,255,255 ; 0.0 | 224,195,252,255 ; 1.0
NETGrad=90 | 41,121,255,255 ; 0.0 | 0,229,255,255 ; 1.0
DISKGrad=90 | 116,214,132,255 ; 0.0 | 139,195,74,255 ; 1.0
