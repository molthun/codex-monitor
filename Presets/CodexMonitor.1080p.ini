IconGap=6
IconYOffset=-1
W=430
H=950
Pad=18
Font=Segoe UI
Text=238,243,247,245
Muted=154,166,178,235
Panel=10,13,18,238
Line=255,255,255,24
Track=255,255,255,30
CPU=0,229,255,255
RAM=69,201,151,255
GPU=151,136,255,255
NET=88,179,255,255
DISK=116,214,132,255
Warn=255,113,113,255
