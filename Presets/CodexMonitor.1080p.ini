[MeasureCPU]
Measure=CPU
Processor=0

[MeasureRAM]
Measure=PhysicalMemory

[MeasureRAMTotal]
Measure=PhysicalMemory
Total=1

[MeasureRAMPct]
Measure=Calc
Formula=(MeasureRAM / MeasureRAMTotal) * 100
MinValue=0
MaxValue=100

[MeasureGPU]
